name: "kosha-discovery CodeQL config"

queries:
  - uses: security-extended

# The proxy is, by design, a credential-forwarding layer. Its entire job is
# to read provider credentials (env vars, ~/.config/<tool>/credentials.json,
# AWS SSO, ADC) and attach them to outbound requests as Authorization /
# x-api-key / etc. Same for the JSONL spend ledger in src/cost.ts — recording
# what callers spent is the feature, and the data sources are inherently
# caller-controlled.
#
# CodeQL's js/file-data-in-fetch (and the related js/sensitive-data-* queries)
# trace exactly that flow and flag it as a "file data reaches outbound
# request" finding. The risk those queries are meant to catch — an attacker
# redirecting a request to an unintended host via a poisoned config — is
# already prevented at the proxy boundary by:
#
#   1. buildUpstreamUrl() for non-local providers reads ONLY the in-process
#      catalog's defaultBaseUrl, never the disk-loaded registry.baseUrl.
#   2. safeUpstreamUrl() validates the resolved hostname against an explicit
#      literal-string allowlist before fetch() is called.
#   3. Ledger entries are written through sanitizeEntry() which strips
#      control characters and bounds the length of every caller-supplied
#      string field.
#
# So we keep the wider security-extended pack but exclude these two queries
# from PR gating. Manual review of the proxy and ledger paths above is
# still required at change time.
query-filters:
  - exclude:
      id: js/file-data-in-fetch
  - exclude:
      id: js/network-data-to-file
