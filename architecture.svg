<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5B21B6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="registryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#312e81;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="layerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="620" rx="12" fill="#0a0a0f"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" fill="#a78bfa" font-size="14" font-weight="600" letter-spacing="2">KOSHA ARCHITECTURE</text>

  <!-- Your Application -->
  <rect x="200" y="52" width="400" height="48" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="72" text-anchor="middle" fill="#fff" font-size="13" font-weight="600">Your Application</text>
  <text x="400" y="90" text-anchor="middle" fill="#c4b5fd" font-size="10">import { createKosha } from "kosha-discovery"</text>

  <!-- Arrow down -->
  <line x1="400" y1="100" x2="400" y2="118" stroke="#6d28d9" stroke-width="2"/>
  <polygon points="394,116 400,124 406,116" fill="#6d28d9"/>

  <!-- ModelRegistry -->
  <rect x="100" y="126" width="600" height="60" rx="8" fill="url(#registryGrad)" stroke="#4c1d95" stroke-width="1" filter="url(#shadow)"/>
  <text x="400" y="148" text-anchor="middle" fill="#e9d5ff" font-size="14" font-weight="700">ModelRegistry</text>
  <text x="400" y="168" text-anchor="middle" fill="#a78bfa" font-size="10">models() · providerRoles() · cheapestModels() · providerHealth()</text>

  <!-- Arrows from registry to 4 layers -->
  <line x1="170" y1="186" x2="170" y2="210" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="166,208 170,214 174,208" fill="#4c1d95"/>
  <line x1="340" y1="186" x2="340" y2="210" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="336,208 340,214 344,208" fill="#4c1d95"/>
  <line x1="510" y1="186" x2="510" y2="210" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="506,208 510,214 514,208" fill="#4c1d95"/>
  <line x1="670" y1="186" x2="670" y2="210" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="666,208 670,214 674,208" fill="#4c1d95"/>

  <!-- Layer boxes row -->
  <!-- Alias System -->
  <rect x="110" y="216" width="120" height="50" rx="6" fill="url(#layerGrad)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="170" y="237" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Alias System</text>
  <text x="170" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">30+ built-in aliases</text>

  <!-- Discovery Layer -->
  <rect x="260" y="216" width="160" height="50" rx="6" fill="url(#layerGrad)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="237" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">Discovery Layer</text>
  <text x="340" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">16 provider discoverers</text>

  <!-- Enrichment Layer -->
  <rect x="450" y="216" width="120" height="50" rx="6" fill="url(#layerGrad)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="510" y="237" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="600">Enrichment</text>
  <text x="510" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">litellm pricing data</text>

  <!-- Resilience Layer -->
  <rect x="600" y="216" width="140" height="50" rx="6" fill="url(#layerGrad)" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="670" y="237" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">Resilience</text>
  <text x="670" y="254" text-anchor="middle" fill="#94a3b8" font-size="9">Circuit Breaker + Cache</text>

  <!-- Arrow from Discovery to providers -->
  <line x1="340" y1="266" x2="340" y2="290" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="336,288 340,294 344,288" fill="#4c1d95"/>

  <!-- Provider groups -->
  <!-- Direct API Providers -->
  <rect x="30" y="300" width="180" height="185" rx="8" fill="#0f172a" stroke="#1e3a5f" stroke-width="1" filter="url(#shadow)"/>
  <text x="120" y="320" text-anchor="middle" fill="#38bdf8" font-size="11" font-weight="600">Direct API</text>
  <line x1="50" y1="328" x2="190" y2="328" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="120" y="348" text-anchor="middle" fill="#cbd5e1" font-size="10">Anthropic</text>
  <text x="120" y="366" text-anchor="middle" fill="#cbd5e1" font-size="10">OpenAI</text>
  <text x="120" y="384" text-anchor="middle" fill="#cbd5e1" font-size="10">Google</text>
  <text x="120" y="402" text-anchor="middle" fill="#cbd5e1" font-size="10">Ollama (local)</text>
  <text x="120" y="420" text-anchor="middle" fill="#cbd5e1" font-size="10">OpenRouter</text>

  <!-- OpenAI-Compatible Providers -->
  <rect x="230" y="300" width="220" height="295" rx="8" fill="#0f172a" stroke="#065f46" stroke-width="1" filter="url(#shadow)"/>
  <text x="340" y="320" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">OpenAI-Compatible</text>
  <text x="340" y="334" text-anchor="middle" fill="#6ee7b7" font-size="8">extends OpenAICompatibleDiscoverer</text>
  <line x1="250" y1="342" x2="430" y2="342" stroke="#065f46" stroke-width="0.5"/>
  <text x="340" y="362" text-anchor="middle" fill="#cbd5e1" font-size="10">NVIDIA (build.nvidia.com)</text>
  <text x="340" y="380" text-anchor="middle" fill="#cbd5e1" font-size="10">Together AI</text>
  <text x="340" y="398" text-anchor="middle" fill="#cbd5e1" font-size="10">Fireworks AI</text>
  <text x="340" y="416" text-anchor="middle" fill="#cbd5e1" font-size="10">Groq</text>
  <text x="340" y="434" text-anchor="middle" fill="#cbd5e1" font-size="10">Mistral AI</text>
  <text x="340" y="452" text-anchor="middle" fill="#cbd5e1" font-size="10">DeepInfra</text>
  <text x="340" y="470" text-anchor="middle" fill="#cbd5e1" font-size="10">Cohere</text>
  <text x="340" y="488" text-anchor="middle" fill="#cbd5e1" font-size="10">Cerebras</text>
  <text x="340" y="506" text-anchor="middle" fill="#cbd5e1" font-size="10">Perplexity</text>

  <!-- Cloud Proxies -->
  <rect x="470" y="300" width="150" height="120" rx="8" fill="#0f172a" stroke="#713f12" stroke-width="1" filter="url(#shadow)"/>
  <text x="545" y="320" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">Cloud Proxies</text>
  <line x1="490" y1="328" x2="600" y2="328" stroke="#713f12" stroke-width="0.5"/>
  <text x="545" y="348" text-anchor="middle" fill="#cbd5e1" font-size="10">AWS Bedrock</text>
  <text x="545" y="366" text-anchor="middle" fill="#cbd5e1" font-size="10">Google Vertex AI</text>
  <text x="545" y="390" text-anchor="middle" fill="#78716c" font-size="9" font-style="italic">SDK + CLI auth</text>
  <text x="545" y="406" text-anchor="middle" fill="#78716c" font-size="9" font-style="italic">Region-aware routing</text>

  <!-- Resilience Detail -->
  <rect x="640" y="300" width="140" height="185" rx="8" fill="#0f172a" stroke="#7f1d1d" stroke-width="1" filter="url(#shadow)"/>
  <text x="710" y="320" text-anchor="middle" fill="#f87171" font-size="11" font-weight="600">Fault Tolerance</text>
  <line x1="655" y1="328" x2="765" y2="328" stroke="#7f1d1d" stroke-width="0.5"/>
  <text x="710" y="350" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">Circuit Breaker</text>
  <text x="710" y="366" text-anchor="middle" fill="#94a3b8" font-size="8">closed → open → half-open</text>
  <text x="710" y="384" text-anchor="middle" fill="#94a3b8" font-size="8">3 failures → 60s cooldown</text>
  <line x1="660" y1="396" x2="760" y2="396" stroke="#7f1d1d" stroke-width="0.3"/>
  <text x="710" y="414" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">Health Tracker</text>
  <text x="710" y="430" text-anchor="middle" fill="#94a3b8" font-size="8">Per-provider state</text>
  <text x="710" y="446" text-anchor="middle" fill="#94a3b8" font-size="8">Auto-heal on probe</text>
  <line x1="660" y1="456" x2="760" y2="456" stroke="#7f1d1d" stroke-width="0.3"/>
  <text x="710" y="472" text-anchor="middle" fill="#fca5a5" font-size="9" font-weight="600">Stale Cache</text>

  <!-- Access Patterns footer -->
  <rect x="30" y="560" width="740" height="44" rx="8" fill="#1e1b4b" stroke="#4c1d95" stroke-width="0.5"/>
  <text x="400" y="578" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">ACCESS PATTERNS</text>
  <text x="160" y="594" text-anchor="middle" fill="#94a3b8" font-size="10">Library (TypeScript/JS)</text>
  <text x="400" y="594" text-anchor="middle" fill="#94a3b8" font-size="10">CLI (kosha discover/list/search)</text>
  <text x="630" y="594" text-anchor="middle" fill="#94a3b8" font-size="10">HTTP API (kosha serve)</text>

  <!-- Dots separating access patterns -->
  <circle cx="275" cy="591" r="2" fill="#4c1d95"/>
  <circle cx="515" cy="591" r="2" fill="#4c1d95"/>
</svg>
